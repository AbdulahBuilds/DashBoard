<body class="bg-gray-100 min-h-screen flex flex-col lg:flex-row">

  <!-- Mobile Topbar -->
  <div class="lg:hidden bg-gray-900 text-white p-4 flex justify-between items-center">
    <h2 class="text-lg font-bold">My Dashboard</h2>
    <button id="menuBtn" class="text-white text-2xl">☰</button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar"
    class="w-full lg:w-60 bg-gray-900 text-white p-5 hidden lg:block">
    <h2 class="text-xl font-bold mb-6 hidden lg:block">My Dashboard</h2>
    <nav class="space-y-2">
      <a href="#" class="block px-4 py-2 rounded bg-gray-800">Dashboard</a>
      <a href="user.html" class="block px-4 py-2 rounded hover:bg-gray-800">Users</a>
      <a href="#" class="block px-4 py-2 rounded hover:bg-gray-800">Reports</a>
      <a href="#" class="block px-4 py-2 rounded hover:bg-gray-800">Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-4 sm:p-6">

    <!-- Top Card -->
    <div class="bg-white p-4 sm:p-5 rounded-xl shadow mb-6">
      <h1 class="text-xl sm:text-2xl font-semibold">Welcome 👋</h1>
      <p class="text-gray-500 text-sm sm:text-base">Tailwind CSS Dashboard</p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-[#334EAC] text-white p-6 rounded-2xl shadow hover:scale-105 transition">
        <h3>Total Users</h3>
        <p id="users" class="text-3xl font-bold mt-2">120</p>
      </div>

      <div class="bg-[#7096D1] text-white p-6 rounded-2xl shadow hover:scale-105 transition">
        <h3>Revenue</h3>
        <p id="revenue" class="text-3xl font-bold mt-2">$540</p>
      </div>

      <div class="bg-[#D0E3FF] text-black p-6 rounded-2xl shadow hover:scale-105 transition">
        <h3>Orders</h3>
        <p id="orders" class="text-3xl font-bold mt-2">32</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="mt-8 flex flex-wrap gap-3">
      <button id="adduserbtn"
        class="bg-[#334EAC] hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow transition hover:-translate-y-1">
        Add User
      </button>

      <button id="updateOrdersBtn"
        class="bg-[#D0E3FF] hover:bg-blue-500 text-black font-semibold px-6 py-3 rounded-lg shadow transition hover:-translate-y-1">
        Update Orders
      </button>

      <button id="URbtn"
        class="bg-[#7096D1] hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow transition hover:-translate-y-1">
        Update Revenue
      </button>
    </div>

  </main>

  <!-- Mobile Sidebar Toggle Script -->
  <script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("hidden");
    });
  </script>

</body>
